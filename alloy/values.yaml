alloy:
  configMap:
    content: |-
      livedebugging {
        enabled = true
      }
  
      logging {
        level  = "info"
        format = "logfmt"
      }
  
      prometheus.remote_write "default" {
        endpoint {
          url = "http://prometheus.${DOMAIN}:9090/api/v1/write"
        }
      }
  
      loki.write "default" {
        endpoint {
          url       = "http://loki.${DOMAIN}:3100/loki/api/v1/push"
          tenant_id = "alloy"
        }
      }
  
      discovery.kubernetes "nodes" {
        role = "node"
      }
  
      prometheus.scrape "kubernetes_nodes" {
        targets    = discovery.kubernetes.nodes.targets
        forward_to = [prometheus.remote_write.default.receiver]
      }
  
      discovery.kubernetes "pods" {
        role = "pod"
      }
  
      prometheus.scrape "kubernetes_pods" {
        targets    = discovery.kubernetes.pods.targets
        forward_to = [prometheus.remote_write.default.receiver]
      }
  
      prometheus.scrape "traefik" {
        targets      = [
          {"__address__" = "traefik.${DOMAIN}:80", "instance" = "traefik"},
        ]
        forward_to   = [prometheus.remote_write.default.receiver]
        metrics_path = "/api"
      }
  
      loki.source.file "traefik" {
        targets    = [
          {__path__ = "/var/log/traefik/access.log", "color" = "blue"},
          {__path__ = "/var/log/traefik/traefik.log", "color" = "grey"},
        ]
        forward_to = [loki.write.default.receiver]
      }
  mounts:
    extra:
    - name: traefik-logs
      mountPath: /var/log/traefik

controller:
  volumes:
    extra:
    - name: traefik-logs
      hostPath:
        path: /var/log/traefik
  tolerations:
  - key: "role"
    operator: "Equal"
    value: "node-s"
    effect: "NoSchedule"

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
  - alloy.${DOMAIN}
