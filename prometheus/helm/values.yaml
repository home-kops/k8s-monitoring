server:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: prometheus
    hosts:
    - prometheus.${DOMAIN}
  persistentVolume:
    enabled: true
    accessModes:
      - ReadWriteMany
    size: 8Gi
    storageClass: nfs-sc
  extraArgs:
    web.enable-remote-write-receiver: ""
  nodeSelector:
    size: m

alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false
