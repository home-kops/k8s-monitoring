server:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: prometheus
    hosts:
    - prometheus.${DOMAIN}
  persistentVolume:
    existingClaim: prometheus-data
  extraArgs:
    web.enable-remote-write-receiver: ""
  tolerations:
  - key: "role"
    operator: "Equal"
    value: "node-m"
    effect: "NoSchedule"

prometheus-pushgateway:
  enabled: true
  tolerations:
  - key: "role"
    operator: "Equal"
    value: "node-m"
    effect: "NoSchedule"
