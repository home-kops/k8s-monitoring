server:
  persistentVolume:
    enabled: true
    accessModes:
      - ReadWriteMany
    size: 8Gi
    storageClass: nfs-sc
  extraArgs:
    web.enable-remote-write-receiver: ""
  nodeSelector:
    size: m

alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false
