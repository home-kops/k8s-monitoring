image:
  repository: influxdb
  tag: 2.7.11-alpine
env:
- name: INFLUXDB_ORG
  valueFrom:
    secretKeyRef:
      name: influxdb-auth
      key: org
adminUser:
  organization: "${INFLUXDB_ORG}"
persistence:
  enabled: true
  useExisting: true
  name: influxdb-data
  mountPath: /var/lib/influxdb2
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
  - influxdb.${DOMAIN}
