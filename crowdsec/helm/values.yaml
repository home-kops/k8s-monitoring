# for raw logs format: json or cri (docker|containerd)
container_runtime: containerd
agent:
  nodeSelector:
    role: cp
  tolerations:
  - key: "role"
    operator: "Equal"
    value: "cp"
    effect: "NoSchedule"
  # Specify each pod whose logs you want to process
  acquisition:
  # The namespace where the pod is located
  - namespace: network
    # The pod name
    podName: traefik-*
    # as in crowdsec configuration, we need to specify the program name to find a matching parser
    program: traefik
  env:
  - name: COLLECTIONS
    value: "crowdsecurity/traefik"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

lapi:
  enabled: true
  envFrom:
  - secretRef:
      name: crowdsec-secrets
  persistentVolume:
    data:
      enabled: true
      accessModes:
      - ReadWriteMany
      storageClassName: nfs-sc
      size: 1Gi
  nodeSelector:
    role: cp
  tolerations:
  - key: "role"
    operator: "Equal"
    value: "cp"
    effect: "NoSchedule"
